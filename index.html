<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="icon" href="img/favicon-to-do.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section class="do-list">
            <div class="do-list__container">

                <div class="do-list__header">
                    <h1 class="do-list__title">TO DO LIST</h1>
                </div>

                <input type="text" class="do-list__input" placeholder="Add a task (press ENTER)">

                <ul class="do-list__things"></ul>

                <div class="do-list__btns">
                    <button class="do-list__btn" id="clearBtn"><img src="img/deletepng.png" alt=""></button>
                    <button class="do-list__btn " id="completedBtn"><img src="img/alldo.png" alt=""></button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
